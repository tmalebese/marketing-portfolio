<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #e8f5e9;
        }
        
        header {
            background: linear-gradient(135deg, #005a3a 0%, #00a86b 100%) !important;
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #26c281;
        }
        
        header h1 {
            margin: 0;
            font-size: 48px;
            color: white !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        header p {
            margin: 10px 0 0 0;
            color: #e8f5e9 !important;
            font-size: 18px;
        }
        
        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        aside {
            width: 25%;
            background: #f0f0f0;
            padding: 20px;
            border-right: 1px solid #ddd;
        }
        
        aside nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        aside nav li {
            margin: 10px 0;
        }
        
        aside nav a {
            color: #00a86b !important;
            text-decoration: none;
            font-weight: 500;
        }
        
        aside nav a:hover {
            color: #005a3a !important;
            text-decoration: underline;
        }
        
        main {
            flex: 1;
            padding: 40px;
            background: white;
        }
        
        main h1, main h2, main h3 {
            color: #005a3a !important;
            border-bottom: 2px solid #00a86b;
            padding-bottom: 10px;
        }
        
        main a {
            color: #00a86b !important;
            font-weight: 500;
        }
        
        main a:hover {
            color: #005a3a !important;
        }
        
        .view-on-github {
            display: none !important;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            background: #f0f0f0;
            border-top: 2px solid #00a86b;
            color: #666;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>
    </header>

    <div class="container">
        <aside>
            <nav>
                <ul>
                    <li><a href="{{ '/' | relative_url }}">📖 Home</a></li>
                    <li><a href="{{ '/about.md' | relative_url }}">👋 About Me</a></li>
                    <li><a href="{{ '/projects/' | relative_url }}">💼 Projects</a></li>
                    <li><a href="{{ '/certifications.md' | relative_url }}">🏅 Certifications</a></li>
                    <li><a href="{{ '/contact.md' | relative_url }}">📧 Contact</a></li>
                </ul>
            </nav>
        </aside>

        <main>
            {{ content }}
        </main>
    </div>

    <footer>
        <p>© 2026 Tebogo Malebese | Marketing Portfolio</p>
        <p><a href="https://github.com/tmalebese/marketing-portfolio">View on GitHub</a></p>
    </footer>
</body>
</html>
